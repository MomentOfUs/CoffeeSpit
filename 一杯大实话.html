  /* /plaza */

  .feed-body .arrow .v { font-weight: 600; margin-top: 2px; }
  .feed-body .arrow .v.truth { color: var(--accent-2); font-family: var(--serif); }
  .feed-body .arrow .to { font-family: var(--mono); color: var(--ink); text-align: center; font-weight: 800; }
  .feed-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .feed-foot { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--rule); }
  .feed-foot .cell { padding: 8px 10px; border-right: 1px solid var(--rule); font-family: var(--mono); font-size: 9.5px; color: var(--muted); letter-spacing: 0.12em; }
  .feed-foot .cell:last-child { border-right: none; }
  .feed-foot .cell b { display: block; color: var(--ink); font-size: 14px; margin-top: 2px; font-weight: 800; }
  .feed-foot .cell b.up { color: var(--accent); }
  .feed-actions { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 10px; color: var(--ink-2); letter-spacing: 0.1em; }
  .feed-actions .left, .feed-actions .right { display: flex; align-items: center; gap: 10px; }
  .feed-actions button { background: none; border: none; padding: 0; color: inherit; font: inherit; display: inline-flex; align-items: center; gap: 4px; letter-spacing: inherit; }
  .feed-actions button:hover { color: var(--accent); }
  .feed-actions .verified { color: var(--accent); }
  .feed-actions .verified::before { content: "✓ "; }
  .feed-card.spotlight { border: 1.5px solid var(--ink); }
  .feed-card.spotlight .feed-head { background: var(--ink); color: var(--bg); }
  .feed-card.spotlight .feed-head .id::before { background: var(--accent); }
  .feed-card.spotlight .feed-head .id { color: var(--bg); }
  .feed-card.spotlight .feed-head .id span:last-child { color: var(--bg); }

  /* /radar */
  .tabs { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--rule); }
  .tab { padding: 10px 0; text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; border-right: 1px solid var(--rule); color: var(--ink-2); }
  .tab:last-child { border-right: none; }
  .tab.active { background: var(--ink); color: var(--bg); }
  .map { margin-top: 12px; aspect-ratio: 4 / 3; border: 1px solid var(--rule); background:
    radial-gradient(circle at 30% 35%, rgba(242,92,5,0.18) 0 6px, transparent 7px),
    radial-gradient(circle at 65% 60%, rgba(28,26,23,0.12) 0 4px, transparent 5px),
    radial-gradient(circle at 78% 28%, rgba(242,92,5,0.18) 0 6px, transparent 7px),
    radial-gradient(circle at 42% 78%, rgba(242,92,5,0.18) 0 6px, transparent 7px),
    radial-gradient(circle at 22% 60%, rgba(242,92,5,0.18) 0 6px, transparent 7px),
    repeating-linear-gradient(0deg, var(--rule-soft) 0 1px, transparent 1px 24px),
    repeating-linear-gradient(90deg, var(--rule-soft) 0 1px, transparent 1px 24px),
    var(--bg-2);
    position: relative;
  }
  .map .pin { position: absolute; width: 14px; height: 14px; background: var(--accent); border: 1.5px solid #fff; transform: translate(-50%, -50%); cursor: pointer; }
  .map .pin.you { background: var(--ink); border-color: var(--accent); }
  .map .pin.active { background: var(--ink); border-color: var(--accent); transform: translate(-50%, -50%) scale(1.4); }
  .map .crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 28px; height: 28px; border: 1px solid var(--ink); }
  .map .crosshair::before, .map .crosshair::after { content: ""; position: absolute; background: var(--ink); }
  .map .crosshair::before { left: 50%; top: -10px; bottom: -10px; width: 1px; transform: translateX(-50%); }
  .map .crosshair::after  { top: 50%; left: -10px; right: -10px; height: 1px; transform: translateY(-50%); }
  .map .legend { position: absolute; left: 8px; bottom: 8px; right: 8px; display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; color: var(--ink-2); background: var(--bg); border: 1px solid var(--rule); padding: 4px 8px; letter-spacing: 0.14em; }
  .shop { border: 1px solid var(--rule); margin-top: 10px; display: grid; grid-template-columns: 1fr 92px; background: var(--bg); transition: transform .15s ease, box-shadow .15s ease; }
  .shop:hover { transform: translateY(-1px); box-shadow: 4px 4px 0 var(--ink); }
  .shop.active { border-color: var(--accent); border-width: 1.5px; }
  .shop .info { padding: 10px 12px; border-right: 1px solid var(--rule); }
  .shop .name { font-weight: 800; font-size: 14px; }
  .shop .name .heart { float: right; font-size: 14px; color: var(--muted); cursor: pointer; user-select: none; }

  .shop-detail { border: 1px solid var(--rule); margin-top: 10px; background: var(--bg-2); padding: 14px; position: relative; }

  .hero-id { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.14em; margin-top: 2px; }
  .hero-rank { display: flex; gap: 4px; margin-top: 6px; }
  .hero-num { margin-top: 12px; border: 1px solid var(--rule); background: var(--bg); display: grid; grid-template-columns: 1fr 1fr; }
  .hero-num .cell { border-right: 1px dashed var(--rule); padding: 14px 12px; }
  .hero-num .cell:last-child { border-right: none; }
  .hero-num .k { font-family: var(--mono); font-size: 9.5px; color: var(--muted); letter-spacing: 0.16em; }

  .hero-num .delta { font-size: 10.5px; color: var(--accent); margin-top: 4px; font-family: var(--mono); }
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid var(--rule); border-top: none; background: var(--bg); }
  .stat-row .cell { padding: 10px 6px; border-right: 1px solid var(--rule); }
  .stat-row .cell:last-child { border-right: none; }
  .stat-row .k { font-family: var(--mono); font-size: 8.5px; color: var(--muted); letter-spacing: 0.14em; }
  .stat-row .v { font-size: 16px; font-weight: 800; margin-top: 4px; font-family: var(--mono); }
  .trend { border: 1px solid var(--rule); background: var(--bg); padding: 12px; }
  .trend h4 { font-size: 12px; letter-spacing: 0.1em; }
  .trend-chart { position: relative; height: 110px; margin-top: 10px; background:
    repeating-linear-gradient(0deg, var(--rule-soft) 0 1px, transparent 1px 22px),
    repeating-linear-gradient(90deg, var(--rule-soft) 0 1px, transparent 1px 28px);
  }
  .trend-chart svg { width: 100%; height: 100%; }
  .trend-axis { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 4px; letter-spacing: 0.12em; }

  .switch-list { border: 1px solid var(--rule); background: var(--bg); }

  .switch-row:last-child { border-bottom: none; }
  .switch-row .label { font-size: 13px; font-weight: 700; }
  .switch-row .sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--mono); letter-spacing: 0.1em; }
  .switch { width: 36px; height: 20px; border: 1px solid var(--rule); background: var(--bg); position: relative; flex: 0 0 36px; cursor: pointer; }
  .switch i { position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; background: var(--ink); transition: all .15s ease; }
  .switch.on { background: var(--accent); border-color: var(--accent); }
  .switch.on i { left: auto; right: 1px; background: #fff; }

  .menu-list { border: 1px solid var(--rule); margin-top: 10px; background: var(--bg); }
  .menu-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--rule); font-size: 13px; }
  .menu-row:last-child { border-bottom: none; }
  .menu-row .right { font-family: var(--mono); color: var(--muted); font-size: 10.5px; letter-spacing: 0.14em; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border: 1px solid var(--rule); font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; }

  .badge.b-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .badge.b-line { background: var(--bg); }
  .achv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .achv { border: 1px solid var(--rule); background: var(--bg); aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 6px 4px; position: relative; }
  .achv.got { background: var(--bg-2); }
  .achv.got::after { content: ""; position: absolute; right: -1px; top: -1px; width: 0; height: 0; border-style: solid; border-width: 0 10px 10px 0; border-color: transparent var(--accent) transparent transparent; }
  .achv .ico { font-size: 22px; line-height: 1; }
  .achv .name { font-size: 9.5px; margin-top: 4px; font-weight: 700; }

  .fav-card { border: 1px solid var(--rule); background: var(--bg); padding: 10px 12px; display: grid; grid-template-columns: 28px 1fr auto; align-items: center; gap: 10px; margin-bottom: 8px; }
  .fav-card .star { width: 28px; height: 28px; background: var(--ink); color: var(--bg); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-weight: 800; font-size: 14px; }

  .fav-card .price { font-family: var(--mono); font-weight: 800; color: var(--accent); }

  .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 100px; z-index: 80; background: var(--ink); color: var(--bg); padding: 10px 16px; font-size: 12px; letter-spacing: 0.08em; border: 1px solid var(--ink); box-shadow: 4px 4px 0 var(--accent); animation: toast-in .25s ease; }

  .skeleton { border: 1px solid var(--rule); padding: 14px; font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.14em; background: var(--bg); }

  .mono { font-family: var(--mono); }
  .serif { font-family: var(--serif); }
  .muted { color: var(--muted); }
  .ink-2 { color: var(--ink-2); }
  .accent { color: var(--accent); }
  .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; } .mt-20 { margin-top: 20px; }
  .right { text-align: right; }

  .fab:hover { background: var(--ink); }
</style>
</head>

  const { reactive, computed, watch, ref } = Vue;
  const STORE_KEY = "coffeespit_state_v3";
  const defaultProfile = { lactoseIntolerant:false, caffeineSensitive:false, sugarFree:false, pregnant:false, vegan:false, lowBudget:true, nightOwl:false };
  function loadState(){ try { return JSON.parse(localStorage.getItem(STORE_KEY) || "null"); } catch(_){ return null; } }
  function saveState(s){ try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(_){} }

  const initial = loadState() || {};
  const state = reactive({
    profile: Object.assign({}, defaultProfile, initial.profile || {}),
    stats: Object.assign({ scanCount:12, savedMoney:450, blockedSpoons:38, roastRead:7, monthSaved:184, monthScans:5, streak:6 }, initial.stats || {}),
    history: initial.history || [],
    favourites: initial.favourites || ["S-01","S-02"],
    achievements: initial.achievements || ["first-scan","streak-7"],
    todayIntake: initial.todayIntake || { caffeineMg:0, sugarG:0, kcal:0, ts:Date.now() }
  });

  // 跨天重置今日摄入
  function isSameDay(a, b) {
    const da = new Date(a), db = new Date(b);
    return da.getFullYear() === db.getFullYear() && da.getMonth() === db.getMonth() && da.getDate() === db.getDate();
  }
  if (!isSameDay(state.todayIntake.ts, Date.now())) {
    state.todayIntake = { caffeineMg:0, sugarG:0, kcal:0, ts:Date.now() };
  }

  watch(state, (v) => saveState(v), { deep: true });

  const profile = computed(() => state.profile);
  const stats   = computed(() => state.stats);
  const today   = computed(() => state.todayIntake);

  // 工具：找上一次的同款/同品牌扫描
  function findPrevOf(target) {
    for (let i = 0; i < state.history.length; i++) {
      if (state.history[i].id === target.id) return { ...state.history[i], idx: i+1 };
    }
    return null;
  }
  function findPrevByBrand(brand) {
    for (let i = 0; i < state.history.length; i++) {
      const c = COFFEES.find(x => x.id === state.history[i].id);
      if (c && c.brand === brand) return c;
    }
    return null;
  }
  // 内联推荐：根据咖啡 premiumRate 推 3 家平价店
  function recommendShops(coffee, n=3) {
    return [...SHOPS]
      .sort((a,b) => a.price - b.price)
      .slice(0, n)
      .map(s => ({ ...s, saved: Math.max(0, coffee.reportedPrice - s.price) }));
  }

        if (v >= 150) return { t:"HIGH", cls:"h" };

        return { t:"LOW", cls:"l" };
      },
      sugarLevel() {
        const v = this.coffee.sugarG;
        if (v >= 25) return { t:"HIGH", cls:"h" };
        if (v >= 12) return { t:"MID",  cls:"m" };
        return { t:"LOW", cls:"l" };
      },
      kcalLevel() {
        const v = this.coffee.kcal;
        if (v >= 280) return { t:"HIGH", cls:"h" };
        if (v >= 160) return { t:"MID",  cls:"m" };
        return { t:"LOW", cls:"l" };
      },
      stateTips() {
        return {
          stomach:  "肠胃不适：避免冷饮、空腹咖啡因，糖浆直接 PASS。",
          insomnia: "失眠：今日咖啡因已 ≥ 200mg，建议改喝低因或白水。",

          fasting:  "空腹：先喝水 / 吃两口碳水再喝咖啡，避免胃痉挛。"
        };
      },
      profileWarnings() {
        const w = [];
        if (this.profile.lactoseIntolerant) w.push("乳糖不耐：燕麦奶 OK，但请确认店家用的是 OATLY 而非「燕麦风味奶精」——后者乳糖含量更高。");
        if (this.profile.caffeineSensitive) w.push("咖啡因敏感：本杯 " + this.coffee.caffeineMg + "mg 已超过你的舒适阈值（建议 ≤ 80mg / 杯），建议改低因或半份浓缩。");
        if (this.profile.sugarFree)        w.push("戒糖：本杯含糖 ≈ " + this.coffee.sugarG + "g ≈ " + (this.coffee.sugarG/4.5).toFixed(1) + " 块方糖，请要求「无糖浆 / 0 泵」。");
        if (this.profile.pregnant)         w.push("孕期：日咖啡因请 ≤ 150mg，本杯 ≈ " + this.coffee.caffeineMg + "mg，今日再喝其它请慎重。");
        if (this.profile.lowBudget)        w.push("平价偏好：此杯溢价 +" + this.coffee.premiumRate + "%，周边 500m 内有同品质 12 元的「巷子口咖啡」。");

        if (this.today.caffeineMg + this.coffee.caffeineMg > 400) w.push("今日累计：本杯叠加后咖啡因将达 " + (this.today.caffeineMg + this.coffee.caffeineMg) + "mg，已超过 400mg 健康线。");
        if (this.today.sugarG + this.coffee.sugarG > 50)         w.push("今日累计：含糖将达 " + (this.today.sugarG + this.coffee.sugarG) + "g，相当于 " + ((this.today.sugarG + this.coffee.sugarG)/4.5).toFixed(1) + " 块方糖。世界卫生组织建议每日添加糖 ≤ 25g。");
        return w;
      },
      compareTarget() {
        const same = findPrevOf(this.coffee);
        if (same) return { kind:'same', idx: same.idx, price: same.price };
        const brand = findPrevByBrand(this.coffee.brand);
        if (brand) return { kind:'brand', brand: brand.brand, price: brand.reportedPrice };
        return null;
      },
      compareDelta() {
        const t = this.compareTarget;
        if (!t) return { v:0, sign:'', cls:'flat', pct:'' };
        const diff = this.coffee.reportedPrice - t.price;
        if (diff === 0) return { v:0, sign:'±', cls:'flat', pct:'无变化' };
        const cls = diff > 0 ? 'up' : 'down';
        const sign = diff > 0 ? '↑' : '↓';
        const pct = (Math.abs(diff) / t.price * 100).toFixed(1) + '%';
        return { v: diff, sign, cls, pct };
      },
      recShops() {
        return recommendShops(this.coffee, 3);
      },
      todayCount() {
        // 估算：用 today intake / 平均每杯咖啡因 100mg
        return Math.max(0, Math.round(this.today.caffeineMg / 100));
      },
      todayTime() {
        const d = new Date(this.today.ts);
        const p = n => n < 10 ? '0'+n : n;
        return p(d.getMonth()+1)+'/'+p(d.getDate());
      }
    },
    methods: {
      toggleState(k) {
        const i = this.activeStates.indexOf(k);
        if (i >= 0) this.activeStates.splice(i, 1);
        else this.activeStates.push(k);
      },
      pickCoffee(c) {
        this.reportVisible = false;
        setTimeout(() => this._commit(c), 200);
      },
      doScan() {
        this.reportVisible = false;
        const pick = COFFEES[Math.floor(Math.random() * COFFEES.length)];
        setTimeout(() => this._commit(pick), 400);
      },
      _commit(pick) {
        this.coffee = pick;
        this.reportVisible = true;
        this.scanNo = (state.stats.scanCount || 0) + 1;
        state.stats.scanCount = (state.stats.scanCount || 0) + 1;
        const saved = Math.max(0, pick.reportedPrice - pick.realCost);
        state.stats.savedMoney = (state.stats.savedMoney || 0) + saved;
        state.stats.roastRead = (state.stats.roastRead || 0) + 1;
        // S6 累加今日摄入
        state.todayIntake.caffeineMg += pick.caffeineMg;
        state.todayIntake.sugarG     += pick.sugarG;
        state.todayIntake.kcal       += pick.kcal;
        state.history.unshift({
          id: pick.id, t: Date.now(),
          name: pick.originalName,
          brand: pick.brand,
          price: pick.reportedPrice,
          saved: saved,
          premium: pick.premiumRate
        });
        if (state.history.length > 30) state.history.length = 30;
        window.dispatchEvent(new CustomEvent("cs:toast", { detail: "已生成 1 份脱水报告 · 本杯省 ¥" + saved }));
        // 滚动到报告
        this.$nextTick(() => {
          const el = document.querySelector(".report");
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      },
      pct(v) {
        const total = this.coffee.costBreakdown.reduce((a,b)=>a+b[1], 0);
        return Math.round(v / total * 100);
      }
    }
  };

              <div class="name"><span class="heart" :class="{ on: isFav(s.id) }" @click.stop="toggleFav(s.id)">♥</span>{{ s.name }}</div>
              <div class="desc">{{ s.desc }}</div>
              <div class="tags"><span class="tag" v-for="t in s.tags" :key="t">{{ t }}</span></div>
            </div>
            <div class="meta"><div class="price">¥{{ s.price }}</div><div class="dist">{{ s.dist }}</div><div class="nav">→ GO</div></div>
          </div>
        </div>
        <div v-if="activeShop" class="shop-detail" :data-id="activeShop">
          <div class="row-between">
            <div>
              <div class="mono" style="font-size:10px; color: var(--muted); letter-spacing:.14em;">{{ currentShop.district }} · ⭐ {{ currentShop.rating }}</div>
              <h4>{{ currentShop.name }}</h4>
            </div>
            <button class="btn btn-sm" @click="activeShop=null">CLOSE ×</button>
          </div>
          <div class="why"><b>为什么是它：</b>{{ currentShop.why }}</div>
          <div class="menu-list">
            <div v-for="(m,i) in currentShop.menu" :key="i" class="row"><span class="name">{{ m[0] }}</span><span class="price">{{ m[1] }}</span></div>
          </div>
        </div>
        <div class="section">
          <div class="section-head"><h3>你刚刚拒绝的那杯</h3><span class="label">FROM /scan</span></div>
          <div class="panel" style="padding: 12px;">
            <div class="row-between">
              <div>
                <div class="mono" style="font-size: 10px; color: var(--muted);">{{ lastScanned ? lastScanned.alias : 'NORDIC DEEP-SEA' }}</div>
                <div style="font-weight: 800; font-size: 14px;">{{ lastScanned ? lastScanned.originalName : "「北欧深海」海盐燕麦拿铁" }}</div>
              </div>
              <div class="mono accent" style="font-size: 14px;">¥{{ lastScanned ? lastScanned.reportedPrice : 38 }} → ¥12</div>
            </div>
            <div class="mono mt-8" style="font-size: 10px; color: var(--muted); letter-spacing:.14em;">RECOMMENDATION</div>
            <div style="font-size: 13px; line-height: 1.6; margin-top: 4px;">走到 <b>师大三号楼窗口</b>，点一杯 ¥12 的「真·燕麦拿铁」。不靠滤镜，不收智商税，老板会朝你点点头。</div>
          </div>
        </div>
      </main>
    `,
    data() { return { tab: "map", shops: SHOPS, activeShop: null }; },
    computed: {
      currentShop() { return this.shops.find(s => s.id === this.activeShop) || {}; },
      lastScanned() { if (!state.history.length) return null; return COFFEES.find(c => c.id === state.history[0].id) || null; }
    },
    methods: {
      isFav(id) { return state.favourites.includes(id); },
      toggleFav(id) {
        const i = state.favourites.indexOf(id);
        if (i >= 0) { state.favourites.splice(i,1); window.dispatchEvent(new CustomEvent("cs:toast", { detail: "已取消收藏" })); }
        else { state.favourites.push(id); window.dispatchEvent(new CustomEvent("cs:toast", { detail: "已加入「我的资产 → 收藏夹」" })); }
      }
    }
  };

  const ProfilePage = {
    template: `
      <main class="page">
        <div class="h-eyebrow">YOUR DOSSIER / 04</div>
        <h1 class="h-title">我的资产</h1>
        <p class="h-sub">持久化健康档案 + 累计识破的每一杯智商税。</p>
        <div class="hero">
          <div class="hero-row">
            <div class="avatar">咖</div>
            <div style="flex:1;">
              <div class="hero-name">冷萃凶手 No.{{ userTag }}</div>
              <div class="hero-id">USER · U-{{ userTag }} · LV.{{ level }}</div>
              <div class="hero-rank">
                <span class="badge b-gold">★ 老用户</span>
                <span class="badge b-accent">月榜 NO.7</span>
                <span class="badge b-line">连续 {{ stats.streak }} 天</span>
              </div>
            </div>
            <button class="iconbtn" @click="reset" title="重置"><svg viewBox="0 0 24 24"><path d="M4 4v6h6"/><path d="M20 20v-6h-6"/><path d="M4 10a8 8 0 0 1 14-3M20 14a8 8 0 0 1-14 3"/></svg></button>
          </div>
          <div class="hero-num">
            <div class="cell"><div class="k">识破陷阱 / SCANS</div><div class="v">{{ stats.scanCount }}<small>次</small></div><div class="delta">↑ 本周 +{{ stats.monthScans || 3 }}</div></div>
            <div class="cell"><div class="k">累计省下 / SAVED</div><div class="v">¥{{ stats.savedMoney }}</div><div class="delta">↑ 本月 +¥{{ stats.monthSaved || 184 }}</div></div>
          </div>
          <div class="stat-row">
            <div class="cell"><div class="k">糖勺</div><div class="v">{{ stats.blockedSpoons }}</div></div>
            <div class="cell"><div class="k">锐评</div><div class="v">{{ stats.roastRead }}</div></div>
            <div class="cell"><div class="k">历史</div><div class="v">{{ history.length }}</div></div>
            <div class="cell"><div class="k">收藏</div><div class="v">{{ state.favourites.length }}</div></div>
          </div>
        </div>

        <!-- Today intake summary -->
        <div class="section">
          <div class="section-head"><h3>今日摄入 / INTAKE</h3><span class="label">LIVE</span></div>
          <div class="today">
            <div class="head-row"><h4>截至 {{ todayTime }}</h4><div class="meta">实时同步自 /scan</div></div>
            <div class="cells">
              <div class="cell" :class="{ over: today.caffeineMg > 400 }">
                <div class="k">CAFFEINE</div><div class="v">{{ today.caffeineMg }}<small>mg</small></div>
                <div class="bar"><i :style="{ width: Math.min(100, today.caffeineMg/400*100) + '%' }"></i></div>
              </div>
              <div class="cell" :class="{ over: today.sugarG > 50 }">
                <div class="k">SUGAR</div><div class="v">{{ today.sugarG }}<small>g</small></div>
                <div class="bar"><i :style="{ width: Math.min(100, today.sugarG/50*100) + '%' }"></i></div>
              </div>
              <div class="cell" :class="{ over: today.kcal > 800 }">
                <div class="k">KCAL</div><div class="v">{{ today.kcal }}<small>kcal</small></div>
                <div class="bar"><i :style="{ width: Math.min(100, today.kcal/800*100) + '%' }"></i></div>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><h3>近 7 日趋势 / TREND</h3><span class="label">SCAN × SAVED</span></div>
          <div class="trend">
            <div class="row-between"><h4>识破次数 / 节省金额</h4><div class="mono" style="font-size: 10px; color: var(--muted); letter-spacing: .14em;">{{ trend.totalScan }} 次 · ¥{{ trend.totalSaved }}</div></div>
            <div class="trend-chart">
              <svg viewBox="0 0 280 100" preserveAspectRatio="none">
                <g v-for="(b, i) in trend.bars" :key="'b'+i"><rect :x="10 + i*38" :y="100 - b.h" width="14" :height="b.h" fill="#1C1A17"/><text :x="10 + i*38 + 7" :y="100 - b.h - 2" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#1C1A17">{{ b.v }}</text></g>
                <polyline :points="trend.line" fill="none" stroke="#F25C05" stroke-width="1.5" stroke-dasharray="3 2"/>
                <g v-for="(p, i) in trend.points" :key="'p'+i"><circle :cx="p.x" :cy="p.y" r="2.4" fill="#F25C05"/></g>
              </svg>
            </div>
            <div class="trend-axis"><span v-for="d in trend.days" :key="d">{{ d }}</span></div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><h3>健康档案 / HEALTH PROFILE</h3><span class="label">AUTO-SAVED</span></div>
          <div class="switch-list">
            <div class="switch-row" v-for="opt in opts" :key="opt.key">
              <div><div class="label">{{ opt.name }}</div><div class="sub">{{ opt.code }}</div></div>
              <div class="switch" :class="{ on: profile[opt.key] }" @click="toggle(opt.key)"><i></i></div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><h3>我的成就 / BADGES</h3><span class="label">{{ gotCount }} / {{ achvs.length }}</span></div>
          <div class="achv-grid">
            <div v-for="a in achvs" :key="a.key" class="achv" :class="{ got: state.achievements.includes(a.key) }" :title="a.desc">
              <div class="ico">{{ a.ico }}</div><div class="name">{{ a.name }}</div><div class="sub">{{ a.sub }}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><h3>收藏的良心店 / FAVOURITES</h3><span class="label">{{ state.favourites.length }} STORES</span></div>
          <div v-if="!state.favourites.length" class="skeleton">[ EMPTY ] · 在 /radar 点击 ♥ 加入收藏</div>
          <div v-else>
            <div v-for="id in state.favourites" :key="id" class="fav-card">
              <div class="star">{{ favShop(id).name[0] }}</div>
              <div><div class="name">{{ favShop(id).name }}</div><div class="meta">{{ favShop(id).district }} · {{ favShop(id).dist }} · ⭐ {{ favShop(id).rating }}</div></div>
              <div class="price">¥{{ favShop(id).price }}</div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><h3>最近扫描 / RECENT</h3><span class="label">LAST 5</span></div>
          <div v-if="history.length===0" class="skeleton">[ EMPTY ] · 还没有扫描记录，去 /scan 启动第一次脱水</div>
          <div v-else class="menu-list">
            <div class="menu-row" v-for="(h,i) in history.slice(0,5)" :key="i">
              <div><span style="font-size:13px;">{{ h.name }}</span><span class="mono" style="font-size:9.5px; color: var(--muted); margin-left:6px; letter-spacing:.1em;">+{{ h.premium }}%</span></div>
              <span class="right">省 ¥{{ h.saved }} · {{ formatT(h.t) }}</span>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head"><h3>设置 / SETTINGS</h3><span class="label">v0.3</span></div>
          <div class="menu-list">
            <div class="menu-row"><span>主题</span><span class="right">燕麦白 / 1C1A17 / F25C05</span></div>
            <div class="menu-row"><span>字体</span><span class="right">INTER · MONO · 宋体</span></div>
            <div class="menu-row"><span>数据来源</span><span class="right">LOCAL · MOCK</span></div>
            <div class="menu-row"><span>语言</span><span class="right">简体中文</span></div>
            <div class="menu-row hover" @click="reset"><span style="color: var(--accent);">重置档案与历史</span><span class="right">TAP →</span></div>
          </div>
        </div>

        <div class="skeleton mt-16" style="text-align:center;">
          [ 一杯大实话 · 拒绝所有网红滤镜 · 接受打赏拒绝赞助 · v0.3 ]
        </div>
      </main>
    `,
    data() {
      return {
        opts: [
          { key:"lactoseIntolerant", name:"乳糖不耐",   code:"LACTOSE-FREE" },
          { key:"caffeineSensitive", name:"咖啡因敏感", code:"LOW-CAFFEINE" },
          { key:"sugarFree",         name:"戒糖",       code:"ZERO-SUGAR" },
          { key:"pregnant",          name:"孕期/备孕",   code:"PREGNANCY" },
          { key:"vegan",             name:"植物基",     code:"PLANT-BASED" },
          { key:"lowBudget",         name:"平价优先",   code:"BUDGET-FIRST" },
          { key:"nightOwl",          name:"夜猫子",     code:"NIGHT-OWL" }
        ],
        achvs: [
          { key:"first-scan",  ico:"✦", name:"初识破",     sub:"FIRST SCAN",  desc:"完成第一次扫描" },
          { key:"streak-7",    ico:"⑦", name:"连续 7 日",  sub:"7D STREAK",   desc:"连续 7 天有识破" },
          { key:"save-100",    ico:"¥", name:"省下百元",   sub:"SAVE 100",    desc:"累计省下 100 元" },
          { key:"savior-10",   ico:"★", name:"救星 10",    sub:"10 SAVES",     desc:"推荐 10 次平价店" },
          { key:"roast-5",     ico:"✺", name:"毒舌 5",     sub:"5 ROASTS",     desc:"阅读 5 条毒舌锐评" },
          { key:"low-caff",    ico:"☕", name:"清醒选择",  sub:"LOW-CAFFEINE", desc:"扫描低因咖啡" },
          { key:"no-sugar",    ico:"◇", name:"无糖先锋",  sub:"NO SUGAR",     desc:"扫描无糖咖啡" },
          { key:"fav-3",       ico:"♥", name:"收藏 3",     sub:"3 FAVS",       desc:"收藏 3 家良心店" }
        ]
      };
    },
    computed: {
      profile() { return state.profile; },
      stats()   { return state.stats; },
      history() { return state.history; },
      today()   { return state.todayIntake; },
      gotCount() { return this.achvs.filter(a => state.achievements.includes(a.key)).length; },
      todayTime() { const d = new Date(this.today.ts); const p=n=>n<10?'0'+n:n; return p(d.getHours())+':'+p(d.getMinutes()); },
      trend() {
        const scans  = [1, 0, 2, 1, 0, 3, 2];
        const saved  = [22, 0, 56, 31, 0, 84, 47];
        const maxScan = Math.max(...scans, 1);
        const maxSave = Math.max(...saved, 1);
        const days    = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
        const bars = scans.map((v, i) => ({ v, h: v/maxScan * 70 + 4 }));
        const line = saved.map((v, i) => { const x = 17 + i*38; const y = 92 - v/maxSave * 70; return (i===0 ? "" : " ") + x + "," + y; }).join(" ").trim();
        const points = saved.map((v, i) => ({ x: 17 + i*38, y: 92 - v/maxSave * 70 }));
        return { bars, line, points, days, totalScan: scans.reduce((a,b)=>a+b,0), totalSaved: saved.reduce((a,b)=>a+b,0) };
      },
      level() { return Math.floor(state.stats.scanCount / 5) + 1; }
    },
    methods: {
      toggle(k) { state.profile[k] = !state.profile[k]; },
      favShop(id) { return SHOPS.find(s => s.id === id) || { name:"未知", district:"", dist:"", price:"-", rating:"-" }; },
      formatT(t) { const d = new Date(t); const p = n => n<10?'0'+n:n; return p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); },
      reset() {
        if (confirm("确认重置所有健康档案、累计数据与历史？")) {
          state.profile = Object.assign({}, defaultProfile);
          state.stats = { scanCount:0, savedMoney:0, blockedSpoons:0, roastRead:0, monthSaved:0, monthScans:0, streak:0 };
          state.history = [];
          state.favourites = [];
          state.achievements = [];
          state.todayIntake = { caffeineMg:0, sugarG:0, kcal:0, ts:Date.now() };
        }
      }
    }
  };

  const routes = [
    { path: "/",        redirect: "/scan" },
    { path: "/scan",    component: ScanPage },
    { path: "/plaza",   component: PlazaPage },
    { path: "/radar",   component: RadarPage },
    { path: "/profile", component: ProfilePage }
  ];
  const router = VueRouter.createRouter({ history: VueRouter.createWebHashHistory(), routes });

  const App = {
    setup() {
      const toast = ref("");
      let toastTimer = null;
      window.addEventListener("cs:toast", (e) => {
        toast.value = e.detail;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { toast.value = ""; }, 2200);
      });
      const userTag = computed(() => String(1000 + (state.stats.scanCount || 0)).slice(-4));
      const padScan = computed(() => String(state.stats.scanCount || 0).padStart(4, "0"));
      return { profile, stats, toast, userTag, padScan };
    }
  };

  const app = Vue.createApp(App);
  app.use(router);
  app.mount("#app");
</script>
</body>
</html>
